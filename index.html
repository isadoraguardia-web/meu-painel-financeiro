function b2b(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function openPanel(pw){
var base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2b(SALT),iterations:ITER,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2b(IV)},key,b2b(CT));

document.open();document.write(html);document.close();
}
document.getElementById("go").onclick=function(){
var e=document.getElementById("err");e.textContent="";
openPanel(document.getElementById("pw").value).catch(function(){e.textContent="Senha incorreta.";});
};
document.getElementById("pw").addEventListener("keydown",function(ev){if(ev.key==="Enter")document.getElementById("go").click();});
