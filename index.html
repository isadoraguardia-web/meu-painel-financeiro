var ITER=250000;
function b2b(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function tryOpen(pw,blob){
var base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2b(blob.salt),iterations:ITER,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2b(blob.iv)},key,b2b(blob.ct));
return new TextDecoder().decode(pt);
}
function render(html){document.open();document.write(html);document.close();}
async function abrir(pw){
try{var h=await tryOpen(pw,FULL);render(h);return;}catch(e){}
try{var h2=await tryOpen(pw,CASA);render(h2);return;}catch(e){}
document.getElementById("err").textContent="Senha incorreta.";
}
document.getElementById("go").onclick=function(){document.getElementById("err").textContent="";abrir(document.getElementById("pw").value);};
document.getElementById("pw").addEventListener("keydown",function(ev){if(ev.key==="Enter")document.getElementById("go").click();});
</script></body></html>
